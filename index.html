<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Evento</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:400px;
    background:white;
    margin:40px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#c40000;
    margin-bottom:25px;
}

input, select{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:16px;
    box-sizing:border-box;
    outline:none;
    transition:0.2s;
}

input:focus,
select:focus{
    border-color:#c40000;
}

.erro{
    border:2px solid red !important;
}

.mensagemErro{
    color:red;
    font-size:14px;
    margin-top:5px;
    display:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#c40000;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

#sucesso{
    text-align:center;
    color:green;
    margin-top:15px;
    display:none;
    font-weight:bold;
}

#loading{
    text-align:center;
    margin-top:15px;
    display:none;
    color:#c40000;
}

</style>
</head>
<body>

<div class="container">

<h1>Cadastro Evento</h1>

<input type="text" id="nome" placeholder="Seu nome">
<div class="mensagemErro" id="erroNome">
Preencha seu nome
</div>

<input type="text" id="equipe" placeholder="Equipe">
<div class="mensagemErro" id="erroEquipe">
Preencha sua equipe
</div>

<select id="camisa">
    <option value="">Tamanho da camisa</option>
    <option value="P">P</option>
    <option value="M">M</option>
    <option value="G">G</option>
    <option value="GG">GG</option>
</select>

<div class="mensagemErro" id="erroCamisa">
Escolha o tamanho da camisa
</div>

<input type="tel" id="telefone" placeholder="Telefone para contato">

<div class="mensagemErro" id="erroTelefone">
Preencha o telefone
</div>

<button id="btnCadastrar" onclick="cadastrar()">
Cadastrar
</button>

<div id="loading">
Enviando cadastro...
</div>

<div id="sucesso">
Cadastro realizado com sucesso!
</div>

</div>

<script>

/* COLE AQUI SUA URL /exec */
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzLnzulBgjrd31TJabVC7_oQrJvZueL-isFgwSUp7y6ui7YDpmJEko-mogBF61O3N7j/exec";

function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

function mostrarErro(campo, erro){
    campo.classList.add("erro");
    erro.style.display = "block";
    vibrar();
}

function removerErro(campo, erro){
    campo.classList.remove("erro");
    erro.style.display = "none";
}

async function cadastrar(){

    const nome = document.getElementById("nome");
    const equipe = document.getElementById("equipe");
    const camisa = document.getElementById("camisa");
    const telefone = document.getElementById("telefone");

    const erroNome = document.getElementById("erroNome");
    const erroEquipe = document.getElementById("erroEquipe");
    const erroCamisa = document.getElementById("erroCamisa");
    const erroTelefone = document.getElementById("erroTelefone");

    const sucesso = document.getElementById("sucesso");
    const loading = document.getElementById("loading");
    const botao = document.getElementById("btnCadastrar");

    sucesso.style.display = "none";

    let valido = true;

    /* VALIDAÇÕES */

    if(nome.value.trim() === ""){
        mostrarErro(nome, erroNome);
        valido = false;
    }else{
        removerErro(nome, erroNome);
    }

    if(equipe.value.trim() === ""){
        mostrarErro(equipe, erroEquipe);
        valido = false;
    }else{
        removerErro(equipe, erroEquipe);
    }

    if(camisa.value === ""){
        mostrarErro(camisa, erroCamisa);
        valido = false;
    }else{
        removerErro(camisa, erroCamisa);
    }

    if(telefone.value.trim() === ""){
        mostrarErro(telefone, erroTelefone);
        valido = false;
    }else{
        removerErro(telefone, erroTelefone);
    }

    if(!valido){
        return;
    }

    /* LOADING */

    loading.style.display = "block";
    botao.disabled = true;

    try{

        const resposta = await fetch(URL_SCRIPT,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                nome:nome.value,
                equipe:equipe.value,
                camisa:camisa.value,
                telefone:telefone.value
            })
        });

        const data = await resposta.json();

        loading.style.display = "none";
        botao.disabled = false;

        if(data.result === "success"){

            sucesso.style.display = "block";

            nome.value = "";
            equipe.value = "";
            camisa.value = "";
            telefone.value = "";

        }else{

            alert("Erro: " + data.message);

        }

    }catch(error){

        loading.style.display = "none";
        botao.disabled = false;

        alert("Erro ao cadastrar");

        console.log(error);

    }

}

</script>

</body>
</html>

</script>

</body>
</html>
