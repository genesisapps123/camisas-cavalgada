<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Evento - XIX Cavalgada</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?q=80&w=1200&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:430px;
    background:#111827;
    border:3px solid #f59b52;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.logo{
    width:100%;
    max-width:280px;
    display:block;
    margin:0 auto 20px auto;
}

.titulo{
    text-align:center;
    color:#ffffff;
    font-size:28px;
    font-weight:700;
    margin-bottom:8px;
}

.subtitulo{
    text-align:center;
    color:#f59b52;
    font-size:15px;
    margin-bottom:25px;
}

input,
select{
    width:100%;
    padding:16px;
    margin-top:12px;
    border-radius:14px;
    border:2px solid #2d3748;
    background:#1f2937;
    color:#fff;
    font-size:16px;
    outline:none;
    transition:0.2s;
}

input::placeholder{
    color:#cbd5e0;
}

select{
    color:#fff;
}

select option{
    background:#111827;
}

input:focus,
select:focus{
    border-color:#f59b52;
    box-shadow:0 0 10px rgba(245,155,82,0.4);
}

.erro{
    border:2px solid #ff3b30 !important;
}

.mensagemErro{
    color:#ff6b6b;
    font-size:13px;
    margin-top:5px;
    display:none;
    padding-left:5px;
}

button{
    width:100%;
    padding:17px;
    margin-top:25px;
    border:none;
    border-radius:14px;
    background:#f59b52;
    color:#111827;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
    opacity:0.95;
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

#loading{
    text-align:center;
    margin-top:18px;
    color:#f59b52;
    display:none;
    font-weight:500;
}

#sucesso{
    text-align:center;
    margin-top:18px;
    color:#4ade80;
    display:none;
    font-weight:600;
    font-size:15px;
}

.rodape{
    text-align:center;
    margin-top:25px;
    color:#9ca3af;
    font-size:13px;
}

</style>
</head>
<body>

<div class="container">

<!-- COLOQUE SUA LOGO NO GITHUB E TROQUE O CAMINHO ABAIXO -->
<img src="logo.png" class="logo">

<div class="titulo">
XIX Cavalgada
</div>

<div class="subtitulo">
Várzea Alegre • Cadastro Oficial
</div>

<input type="text" id="nome" placeholder="Nome completo">

<div class="mensagemErro" id="erroNome">
Preencha seu nome
</div>

<input type="text" id="equipe" placeholder="Equipe">

<div class="mensagemErro" id="erroEquipe">
Preencha sua equipe
</div>

<select id="camisa">
    <option value="">Tamanho da camisa</option>
    <option value="P">P</option>
    <option value="M">M</option>
    <option value="G">G</option>
    <option value="GG">GG</option>
</select>

<div class="mensagemErro" id="erroCamisa">
Escolha o tamanho da camisa
</div>

<input type="tel" id="telefone" placeholder="Telefone para contato">

<div class="mensagemErro" id="erroTelefone">
Preencha o telefone
</div>

<button id="btnCadastrar" onclick="cadastrar()">
REALIZAR CADASTRO
</button>

<div id="loading">
Enviando cadastro...
</div>

<div id="sucesso">
Cadastro realizado com sucesso!
</div>

<div class="rodape">
XIX Cavalgada de Várzea Alegre
</div>

</div>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzLnzulBgjrd31TJabVC7_oQrJvZueL-isFgwSUp7y6ui7YDpmJEko-mogBF61O3N7j/exec";

function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate(200);
    }
}

function mostrarErro(campo, erro){
    campo.classList.add("erro");
    erro.style.display = "block";
    vibrar();
}

function removerErro(campo, erro){
    campo.classList.remove("erro");
    erro.style.display = "none";
}

async function cadastrar(){

    const nome = document.getElementById("nome");
    const equipe = document.getElementById("equipe");
    const camisa = document.getElementById("camisa");
    const telefone = document.getElementById("telefone");

    const erroNome = document.getElementById("erroNome");
    const erroEquipe = document.getElementById("erroEquipe");
    const erroCamisa = document.getElementById("erroCamisa");
    const erroTelefone = document.getElementById("erroTelefone");

    const sucesso = document.getElementById("sucesso");
    const loading = document.getElementById("loading");
    const botao = document.getElementById("btnCadastrar");

    sucesso.style.display = "none";

    let valido = true;

    if(nome.value.trim() === ""){
        mostrarErro(nome, erroNome);
        valido = false;
    }else{
        removerErro(nome, erroNome);
    }

    if(equipe.value.trim() === ""){
        mostrarErro(equipe, erroEquipe);
        valido = false;
    }else{
        removerErro(equipe, erroEquipe);
    }

    if(camisa.value === ""){
        mostrarErro(camisa, erroCamisa);
        valido = false;
    }else{
        removerErro(camisa, erroCamisa);
    }

    if(telefone.value.trim() === ""){
        mostrarErro(telefone, erroTelefone);
        valido = false;
    }else{
        removerErro(telefone, erroTelefone);
    }

    if(!valido){
        return;
    }

    loading.style.display = "block";
    botao.disabled = true;

    try{

        await fetch(URL_SCRIPT,{
            method:"POST",
            mode:"no-cors",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                nome:nome.value,
                equipe:equipe.value,
                camisa:camisa.value,
                telefone:telefone.value
            })
        });

        loading.style.display = "none";
        botao.disabled = false;

        sucesso.style.display = "block";

        nome.value = "";
        equipe.value = "";
        camisa.value = "";
        telefone.value = "";

    }catch(error){

        loading.style.display = "none";
        botao.disabled = false;

        alert("Erro ao cadastrar");

        console.log(error);

    }

}

</script>

</body>
</html>



</script>

</body>
</html>
