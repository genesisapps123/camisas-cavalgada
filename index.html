<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Evento</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:90%;
    max-width:400px;
    background:white;
    margin:40px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#c40000;
}

input, select{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid #ddd;
    font-size:16px;
    box-sizing:border-box;
}

.erro{
    border:2px solid red !important;
}

.mensagemErro{
    color:red;
    font-size:14px;
    margin-top:5px;
    display:none;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#c40000;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#sucesso{
    text-align:center;
    color:green;
    margin-top:15px;
    display:none;
}

</style>
</head>
<body>

<div class="container">

<h1>Cadastro Evento</h1>

<input type="text" id="nome" placeholder="Seu nome">
<div class="mensagemErro" id="erroNome">Preencha seu nome</div>

<input type="text" id="equipe" placeholder="Equipe">
<div class="mensagemErro" id="erroEquipe">Preencha sua equipe</div>

<select id="camisa">
<option value="">Tamanho da camisa</option>
<option>P</option>
<option>M</option>
<option>G</option>
<option>GG</option>
</select>
<div class="mensagemErro" id="erroCamisa">Escolha o tamanho</div>

<input type="tel" id="telefone" placeholder="Telefone">
<div class="mensagemErro" id="erroTelefone">Preencha o telefone</div>

<button onclick="cadastrar()">Cadastrar</button>

<div id="sucesso">
Cadastro realizado com sucesso!
</div>

</div>

<script>

const URL_SCRIPT = "https://script.google.com/macros/library/d/1E5OCng5Kn9PDFzXOY8xS1ERK16wSMDUWgNlX9mn3jlfmYg1qxhG8YorC/1";

function vibrar(){
   if(navigator.vibrate){
      navigator.vibrate(200);
   }
}

function mostrarErro(campo, erro){
    campo.classList.add("erro");
    erro.style.display = "block";
    vibrar();
}

function removerErro(campo, erro){
    campo.classList.remove("erro");
    erro.style.display = "none";
}

function cadastrar(){

    const nome = document.getElementById("nome");
    const equipe = document.getElementById("equipe");
    const camisa = document.getElementById("camisa");
    const telefone = document.getElementById("telefone");

    let valido = true;

    if(nome.value.trim() === ""){
        mostrarErro(nome, erroNome);
        valido = false;
    }else{
        removerErro(nome, erroNome);
    }

    if(equipe.value.trim() === ""){
        mostrarErro(equipe, erroEquipe);
        valido = false;
    }else{
        removerErro(equipe, erroEquipe);
    }

    if(camisa.value === ""){
        mostrarErro(camisa, erroCamisa);
        valido = false;
    }else{
        removerErro(camisa, erroCamisa);
    }

    if(telefone.value.trim() === ""){
        mostrarErro(telefone, erroTelefone);
        valido = false;
    }else{
        removerErro(telefone, erroTelefone);
    }

    if(!valido){
        return;
    }

    fetch(URL_SCRIPT,{
        method:"POST",
        body:JSON.stringify({
            nome:nome.value,
            equipe:equipe.value,
            camisa:camisa.value,
            telefone:telefone.value
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("sucesso").style.display = "block";

        nome.value = "";
        equipe.value = "";
        camisa.value = "";
        telefone.value = "";

    })
    .catch(err => {
        alert("Erro ao cadastrar");
    });

}

</script>

</body>
</html>
